<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VVIP 전용 예비창업패키지 면접관 역린 공격 프롬프트 (Tier 3)</title>
<style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 20px;
        font-family: 'Pretendard', sans-serif;
        background-color: #000;
        color: #fff;
        display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .container {
        width: 100%; max-width: 700px;
        background: #111;
        border: 1px solid #333;
        border-radius: 12px; padding: 35px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.8);
    }
    .badge {
        display: inline-block; padding: 6px 12px; border-radius: 30px;
        background: linear-gradient(90deg, #f59e0b, #d97706);
        color: black; font-weight: 800; font-size: 13px; margin-bottom: 20px;
    }
    h1 { font-size: 26px; margin: 0 0 15px 0; font-weight: 800; letter-spacing: -0.5px; }
    p.desc { font-size: 15px; color: #888; line-height: 1.6; margin-bottom: 25px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #ccc; font-size: 14px; }
    input[type="text"], textarea {
        width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #444;
        background: #1a1a1a; color: #fff; font-family: inherit; font-size: 15px;
        margin-bottom: 20px; transition: border 0.2s; outline: none;
    }
    input[type="text"]:focus, textarea:focus { border: 1px solid #f59e0b; }
    button {
        width: 100%; padding: 16px; background: #fff; color: #000; border: none;
        border-radius: 8px; font-size: 16px; font-weight: 800; cursor: pointer;
        transition: all 0.2s;
    }
    button:hover { background: #f59e0b; color: #000; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2); }
    .generated-box {
        margin-top: 30px; padding: 20px; background: #1a1a1a; border-radius: 8px;
        border-left: 4px solid #f59e0b; display: none;
    }
    .copy-btn {
        display: block; width: 100%; margin-top: 15px; padding: 12px;
        background: #333; color: white; border: none; border-radius: 6px; cursor: pointer;
    }
    .copy-btn:hover { background: #444; }
    pre { white-space: pre-wrap; font-size: 14px; color: #e5e5e5; line-height: 1.5; font-family: 'Pretendard', inherit; }
</style>
</head>
<body>

<div class="container">
    <div class="badge">VVIP 마스터 전용 시스템 (Tier 3)</div>
    <h1>심사위원 '역린 공격' 자동 생성기</h1>
    <p class="desc">대면 발표(PT) 현장에서 가장 뼈 아픈 질문이 날아올 곳을 1초 만에 미리 찾아냅니다.<br>여러분의 치명적인 빈틈을 파악하고, 무적의 합격 방어 스크립트 메가 프롬프트를 찍어내십시오.</p>

    <label>1. 준비하시는 비즈니스 아이템을 간단히 적어주세요.</label>
    <input type="text" id="itemField" placeholder="예: 무인 점포를 위한 AI 기반 재고 관리 시스템">

    <label>2. 이 아이템의 타겟 고객은 누구입니까?</label>
    <input type="text" id="targetField" placeholder="예: 월 매출 500만 원 이하의 소상공인 무인 점포 사장님">

    <button onclick="generatePrompt()">악마의 탈탈 털기 프롬프트 엔진 가동</button>

    <div id="output-area" class="generated-box">
        <label>생성된 메가 프롬프트 (ChatGPT/Claude에 그대로 복사하여 붙여넣으십시오)</label>
        <pre id="promptResult"></pre>
        <button class="copy-btn" onclick="copyToClipboard()">📋 프롬프트 복사하기</button>
    </div>
</div>

<script>
function generatePrompt() {
    const item = document.getElementById('itemField').value.trim() || '[비즈니스 아이템]';
    const target = document.getElementById('targetField').value.trim() || '[타겟 고객]';
    
    const promptText = `
당신은 대한민국 예비창업패키지 결선 심사를 담당하는 20년 차 벤처캐피탈(VC) 수석 심사위원입니다.
당신은 스타트업 대표들의 허세 섞인 발표를 극도로 혐오하며, 데이터와 숫자가 없는 말장난을 하는 즉시 탈락시킵니다.

현재 제 비즈니스 아이템은 "${item}" 이며, 
핵심 타겟 고객은 "${target}" 입니다.

이 아이템을 가지고 5분PT 대면 심사장에 섰다고 가정합시다.
아래 4가지 극악의 기준표에 맞춰, 내가 절대로 듣고 싶지 않은 '치명적인 역린 타격 질문' 5가지를 아주 매섭고 차가운 어조로 먼저 던지십시오.

[심사위원 평가 기준표]
1. 대체제 존재 여부: "기존 카카오나 네이버가 무료로 당장 이걸 출시해도 고객들이 당신 것을 쓸 이유가 단 하나라도 있습니까?"
2. 생애 가치(LTV)와 획득 비용(CAC) 구조: "그 고객 한 명을 결제까지 끌고 오는 데 마케팅비 얼마 쓰실 겁니까? 흑자 전환(BEP) 시점은 언제입니까?"
3. 시장 규모(SAM)와 성장성: "방금 말한 타겟의 실제 시장 파이가 도대체 몇 억이나 되길래 이 비즈니스를 한다는 겁니까?"
4. 팀 내재화 역량: "이거 대표님이 직접 만드실 수 있나요? 외주 끼고 파투 나면 어쩌실 겁니까?"

질문 5가지를 쏟아낸 직후, 
심사위원의 빙의를 풀고 '1등 컨설턴트'의 입장이 되어서, 이 5가지 지옥의 질문을 완벽히 데이터로 눌러버릴 수 있는 [철통 반박 방어 스크립트] 가이드라인을 작성해 주십시오. 
문어체가 아닌 지극히 자연스럽고 당당한 한국어 구어체로 방어 대본을 짜주십시오.`;

    document.getElementById('promptResult').innerText = promptText;
    document.getElementById('output-area').style.display = 'block';
}

function copyToClipboard() {
    const text = document.getElementById('promptResult').innerText;
    navigator.clipboard.writeText(text).then(() => {
        alert('악마의 프롬프트가 복사되었습니다! 당장 AI 에디터를 켜서 붙여넣기 하십시오.');
    });
}
</script>
</body>
</html>
